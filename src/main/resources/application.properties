spring.application.name=springia

# Cria automaticamente o arquivo do banco H2 ao subir a aplicacao.
spring.datasource.url=jdbc:h2:file:./data/springia2-db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Recria o schema na inicializacao para executar o import.sql.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.hbm2ddl.import_files=import.sql
spring.h2.console.enabled=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.tool.schema=DEBUG
logging.level.org.hibernate.orm.schema=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.org.hibernate.orm.jdbc.extract=DEBUG
logging.level.org.springframework.orm.jpa=DEBUG
logging.level.org.springframework.transaction=DEBUG
logging.level.com.example.springia=DEBUG

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

azure.ai.project.endpoint=https://gustavocontabeis-1720-resource.services.ai.azure.com/api/projects/gustavocontabeis-1720
