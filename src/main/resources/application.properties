spring.application.name=springia

# Configuracao do PostgreSQL/PGVector.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/springia}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:springia}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:springia}

spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.tool.schema=DEBUG
logging.level.org.hibernate.orm.schema=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.org.hibernate.orm.jdbc.extract=DEBUG
logging.level.org.springframework.orm.jpa=DEBUG
logging.level.org.springframework.transaction=DEBUG

# LOG APLICAÇÃO
logging.level.com.example.springia=INFO

management.endpoints.web.exposure.include=health,loggers
management.endpoint.health.show-details=never

azure.ai.project.endpoint=${AZURE_AI_PROJECT_ENDPOINT}
spring.ai.openai.base-url=${SPRING_AI_OPENAI_BASE_URL}
spring.ai.openai.api-key=${SPRING_AI_OPENAI_API_KEY}
#spring.ai.openai.chat.options.model=${SPRING_AI_OPENAI_CHAT_OPTIONS_MODEL:gpt-4o-mini}
spring.ai.openai.chat.options.model=gpt-5.3-codex
spring.ai.openai.chat.timeout=300s
spring.ai.openai.timeout=300s

# GitHub configuration
github.token=${GITHUB_TOKEN}

clone.directory=/home/gustavo/dev/teste-spring-ia/clone-repo

# Configuracoes do agente autonomo
agent.backend-root=/tmp/tarefas-backend
agent.frontend-root=/tmp/tarefas-frontend
agent.max-iterations=100
agent.iteration-timeout=10m
agent.compilation-timeout=10m
agent.transient-retries=10
agent.llm-enabled=true
agent.tool-calling-system-prompt=classpath:prompts/tool-calling-system-prompt.md

